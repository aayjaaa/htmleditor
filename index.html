<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HTML Live Editor</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
  <meta name="description" content="Edit HTML and instantly see the preview — and even edit the preview to update the code.">
  <meta property="og:title" content="⚡ HTML Live Editor">
  <meta property="og:description" content="Single-file HTML editor with live preview and visual edit mode. No install needed.">
  <meta property="og:url" content="https://aayjaaa.github.io/htmleditor">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      display: flex;
      flex-direction: column;
      height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1a1a1a;
      overflow: hidden;
    }

    /* ── 툴바 ── */
    .toolbar {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 7px 12px;
      background: #1A2B2B;
      border-bottom: 2px solid #009B9B;
      flex-shrink: 0;
    }
    .toolbar-logo {
      font-weight: 700;
      font-size: 13px;
      color: #C8E600;
      letter-spacing: 0.5px;
      margin-right: 2px;
    }
    .toolbar-sep { width: 1px; height: 18px; background: #334; margin: 0 2px; }
    .spacer { flex: 1; }

    /* ── 버튼 공통 ── */
    .btn {
      padding: 4px 11px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 11px;
      font-weight: 600;
      transition: opacity 0.15s, transform 0.1s;
      white-space: nowrap;
    }
    .btn:active { transform: scale(0.95); }
    .btn:hover  { opacity: 0.82; }

    .btn-edit  { background: #3a3a3a; color: #ccc; }
    .btn-edit.on { background: #009B9B; color: #fff; }
    .btn-copy  { background: #2a2a2a; color: #aaa; }
    .btn-fmt   { background: #2a2a2a; color: #aaa; }
    .btn-clear { background: #2a2a2a; color: #f55; }

    .btn-apply {
      background: #009B9B; color: #fff;
      padding: 3px 10px; font-size: 11px;
    }
    .btn-apply:hover { background: #007a7a; }
    .btn-apply-code {
      background: #C8E600; color: #1a2b2b;
      padding: 3px 10px; font-size: 11px;
    }
    .btn-apply-code:hover { background: #a8c200; }

    /* 언어 선택 */
    .lang-select {
      padding: 4px 6px;
      border: 1px solid #009B9B55;
      border-radius: 4px;
      background: #1A2B2B;
      color: #C8E600;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      outline: none;
    }
    .lang-select:hover { border-color: #009B9B; }
    .lang-select option { background: #1A2B2B; color: #C8E600; }

    kbd {
      display: inline-block;
      padding: 1px 4px;
      background: #333;
      border-radius: 3px;
      font-size: 9px;
      color: #777;
      margin-left: 3px;
    }

    /* ── 메인 ── */
    .main { display: flex; flex: 1; overflow: hidden; }

    /* ── 에디터 패널 ── */
    .editor-pane {
      display: flex;
      flex-direction: column;
      width: 50%;
      min-width: 180px;
    }

    .pane-header {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 5px 10px;
      background: #252525;
      color: #888;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.4px;
      border-bottom: 1px solid #333;
      flex-shrink: 0;
    }
    .dot { width: 7px; height: 7px; border-radius: 50%; }
    .ph-spacer { flex: 1; }

    .editor-wrap { display: flex; flex: 1; overflow: hidden; }

    .line-nums {
      padding: 14px 6px 14px 10px;
      background: #1e1e1e;
      color: #4a4a4a;
      font-family: 'Cascadia Code', 'JetBrains Mono', 'Fira Code', Consolas, monospace;
      font-size: 13px;
      line-height: 1.7;
      text-align: right;
      user-select: none;
      border-right: 1px solid #2a2a2a;
      width: 48px;
      flex-shrink: 0;
      white-space: pre;
      overflow: hidden;
    }

    #codeEditor {
      flex: 1;
      border: none;
      outline: none;
      resize: none;
      font-family: 'Cascadia Code', 'JetBrains Mono', 'Fira Code', Consolas, monospace;
      font-size: 13px;
      line-height: 1.7;
      padding: 14px 14px;
      background: #1e1e1e;
      color: #d4d4d4;
      tab-size: 2;
      overflow-y: scroll;
    }
    #codeEditor::placeholder { color: #3a3a3a; }

    /* ── 분할 바 ── */
    .divider {
      width: 5px;
      background: #222;
      cursor: col-resize;
      flex-shrink: 0;
      transition: background 0.2s;
      position: relative;
    }
    .divider::after {
      content: '';
      position: absolute;
      top: 50%; left: 1px;
      transform: translateY(-50%);
      width: 3px; height: 36px;
      border-radius: 2px;
      background: #3a3a3a;
    }
    .divider:hover, .divider.dragging { background: #009B9B33; }
    .divider:hover::after, .divider.dragging::after { background: #009B9B; }

    /* ── 미리보기 패널 ── */
    .preview-pane {
      display: flex;
      flex-direction: column;
      flex: 1;
      min-width: 180px;
    }

    #preview { flex: 1; border: none; background: #fff; }

    /* ── 상태바 ── */
    .statusbar {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 3px 12px;
      background: #0d1a1a;
      color: #444;
      font-size: 11px;
      flex-shrink: 0;
      border-top: 1px solid #1a2424;
    }
    .status-mode { color: #009B9B; font-weight: 600; }
    .status-right { margin-left: auto; color: #3a3a3a; }
    .status-right.flash { color: #C8E600; }

    /* ── 토스트 ── */
    .toast {
      position: fixed;
      bottom: 36px; left: 50%;
      transform: translateX(-50%) translateY(16px);
      background: #009B9B;
      color: #fff;
      padding: 7px 18px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      opacity: 0;
      transition: all 0.25s;
      pointer-events: none;
      z-index: 999;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

  <!-- ── 툴바 ── -->
  <div class="toolbar">
    <span class="toolbar-logo">⚡ HTML Live Editor</span>
    <div class="toolbar-sep"></div>
    <button class="btn btn-edit" id="editModeBtn" onclick="toggleEditMode()"></button>
    <div class="spacer"></div>
    <button class="btn btn-fmt"   id="btnFormat" onclick="formatHTML()"></button>
    <button class="btn btn-copy"  id="btnCopy"   onclick="copyHTML()"></button>
    <button class="btn btn-clear" id="btnClear"  onclick="clearAll()">🗑</button>
    <div class="toolbar-sep"></div>
    <!-- 언어 선택 -->
    <select class="lang-select" id="langSelect" onchange="changeLang(this.value)">
      <option value="ko">한국어</option>
      <option value="en">English</option>
      <option value="es">Español</option>
      <option value="zh">中文(简体)</option>
    </select>
  </div>

  <!-- ── 메인 ── -->
  <div class="main" id="mainArea">

    <!-- 에디터 -->
    <div class="editor-pane" id="editorPane">
      <div class="pane-header">
        <span class="dot" style="background:#f55"></span>
        <span class="dot" style="background:#fa0"></span>
        <span class="dot" style="background:#5c5"></span>
        &nbsp;<span id="labelCode"></span>
        <span class="ph-spacer"></span>
        <button class="btn btn-apply" id="btnApplyPreview" onclick="applyToPreview()"></button>
      </div>
      <div class="editor-wrap">
        <div class="line-nums" id="lineNums">1</div>
        <textarea id="codeEditor" spellcheck="false"></textarea>
      </div>
    </div>

    <!-- 분할 바 -->
    <div class="divider" id="divider"></div>

    <!-- 미리보기 -->
    <div class="preview-pane" id="previewPane">
      <div class="pane-header">
        <span class="dot" style="background:#009B9B"></span>
        &nbsp;<span id="labelPreview"></span>
        <span id="editHint" style="display:none; color:#C8E600; font-size:10px; margin-left:4px;"></span>
        <span class="ph-spacer"></span>
        <button class="btn btn-apply-code" id="applyCodeBtn"
          onclick="applyToCode()" style="display:none;"></button>
      </div>
      <iframe id="preview"></iframe>
    </div>

  </div>

  <!-- ── 상태바 ── -->
  <div class="statusbar">
    <span class="status-mode" id="statusMode"></span>
    <span id="statusChars"></span>
    <span id="statusLines"></span>
    <span class="status-right" id="statusRight"></span>
  </div>

  <!-- 토스트 -->
  <div class="toast" id="toast"></div>

<body>
  <h1>⚡ HTML Live Editor</h1>
  <p>编辑左侧代码，点击 <strong>▶ 应用预览</strong> 按钮，更改将在此处显示。</p>
  <div class="card">
    <h2>📌 使用方法</h2>
    <ul>
      <li>在左侧粘贴 HTML 代码 → 点击 <code>▶ 应用预览</code></li>
      <li><strong>✏️ 可视编辑</strong> 按钮 → 直接点击预览中的文字进行编辑</li>
      <li>编辑完成后 → 点击 <code>✅ 应用到代码</code></li>
    </ul>
  </div>
  <div class="card">
    <h2>⌨️ 快捷键</h2>
    <ul>
      <li><code>F5</code> — 应用预览</li>
      <li><code>Ctrl+E</code> — 切换编辑模式</li>
      <li><code>Ctrl+Shift+C</code> — 复制所有 HTML</li>
      <li><code>Tab</code> — 缩进（编辑器中）</li>
    </ul>
  </div>
</body>
</html>`
    };

    // ══════════════════════════════════════════
    //  상태
    // ══════════════════════════════════════════
    const editor       = document.getElementById('codeEditor');
    const iframe       = document.getElementById('preview');
    const lineNums     = document.getElementById('lineNums');
    const editModeBtn  = document.getElementById('editModeBtn');
    const applyCodeBtn = document.getElementById('applyCodeBtn');
    const editHint     = document.getElementById('editHint');

    let currentLang = 'en';
    let editMode    = false;
    let demoMode    = true; // 데모 상태면 언어 변경 시 데모도 교체

    // 번역 헬퍼
    function t(key) { return LANGS[currentLang][key]; }

    // ── 초기화 ──
    editor.value = DEMOS['en'];
    applyLang('en');
    updateLineNums();
    applyToPreview();

    // ── 입력 감지 → demoMode 해제 ──
    editor.addEventListener('input', () => {
      demoMode = false;
      updateLineNums();
    });
    editor.addEventListener('scroll', () => { lineNums.scrollTop = editor.scrollTop; });
    editor.addEventListener('keydown', handleKey);

    // ══════════════════════════════════════════
    //  언어 적용
    // ══════════════════════════════════════════
    function applyLang(lang) {
      currentLang = lang;
      document.getElementById('langSelect').value = lang;

      // 툴바
      editModeBtn.textContent = editMode ? t('editOn') : t('editOff');
      document.getElementById('btnFormat').textContent = t('format');
      document.getElementById('btnCopy').textContent   = t('copy');

      // 패널 헤더
      document.getElementById('labelCode').textContent    = t('labelCode');
      document.getElementById('labelPreview').textContent = t('labelPreview');
      editHint.textContent = t('editHint');

      // ▶ 적용 버튼 (kbd 포함)
      document.getElementById('btnApplyPreview').innerHTML =
        t('applyPreview') + ' <kbd>' + t('keyF5') + '</kbd>';

      // ✅ 코드 반영 버튼
      applyCodeBtn.textContent = t('applyCode');

      // textarea placeholder
      editor.placeholder = t('placeholder');

      // 상태바
      document.getElementById('statusMode').textContent =
        editMode ? t('modeEdit') : t('modeView');
      document.getElementById('statusRight').textContent =
        document.getElementById('statusRight').textContent || t('statusInit');

      updateStatusBar();
    }

    function changeLang(lang) {
      applyLang(lang);
      // 데모 상태이면 해당 언어 데모로 교체
      if (demoMode) {
        editor.value = DEMOS[lang];
        updateLineNums();
        applyToPreview();
      }
    }

    // ══════════════════════════════════════════
    //  코드 → 미리보기 적용
    // ══════════════════════════════════════════
    function applyToPreview() {
      iframe.srcdoc = editor.value;
      iframe.onload = function() {
        if (editMode) enablePreviewEdit();
      };
      setRight(t('previewApplied') + now());
    }

    // ── 편집 모드 활성화 ──
    function enablePreviewEdit() {
      try {
        const iDoc = iframe.contentDocument || iframe.contentWindow.document;
        if (!iDoc || !iDoc.body) return;
        iDoc.querySelectorAll('[data-lei]').forEach(el => el.remove());
        const s = iDoc.createElement('style');
        s.setAttribute('data-lei', '');
        s.textContent =
          '[contenteditable]:hover{outline:2px dashed #009B9B !important;outline-offset:2px;cursor:text;}' +
          '[contenteditable]:focus{outline:2px solid #009B9B !important;outline-offset:2px;}';
        iDoc.head.appendChild(s);
        iDoc.body.contentEditable = 'true';
      } catch(e) {
        showToast(t('toastEditErr') + e.message);
      }
    }

    // ══════════════════════════════════════════
    //  미리보기 → 코드 반영
    // ══════════════════════════════════════════
    function applyToCode() {
      try {
        const iDoc = iframe.contentDocument || iframe.contentWindow.document;
        if (!iDoc) { showToast(t('toastNoAccess')); return; }

        const injected = Array.from(iDoc.querySelectorAll('[data-lei]'));
        injected.forEach(el => el.remove());
        iDoc.body.removeAttribute('contenteditable');

        const html = '<!DOCTYPE html>\n' + iDoc.documentElement.outerHTML;

        iDoc.body.contentEditable = 'true';
        injected.forEach(el => {
          if (el.tagName === 'STYLE') iDoc.head.appendChild(el);
        });

        editor.value = html;
        demoMode = false;
        updateLineNums();
        updateStatusBar();
        setRight(t('codeApplied') + now());
        showToast(t('toastCode'));
      } catch(e) {
        showToast(t('toastApplyErr') + e.message);
      }
    }

    // ══════════════════════════════════════════
    //  편집 모드 토글
    // ══════════════════════════════════════════
    function toggleEditMode() {
      editMode = !editMode;
      if (editMode) {
        editModeBtn.textContent = t('editOn');
        editModeBtn.classList.add('on');
        applyCodeBtn.style.display = 'inline-block';
        editHint.style.display = 'inline';
        document.getElementById('statusMode').textContent = t('modeEdit');
        enablePreviewEdit();
      } else {
        editModeBtn.textContent = t('editOff');
        editModeBtn.classList.remove('on');
        applyCodeBtn.style.display = 'none';
        editHint.style.display = 'none';
        document.getElementById('statusMode').textContent = t('modeView');
        try {
          const iDoc = iframe.contentDocument || iframe.contentWindow.document;
          if (iDoc && iDoc.body) {
            iDoc.body.removeAttribute('contenteditable');
            iDoc.querySelectorAll('[data-lei]').forEach(el => el.remove());
          }
        } catch(e) {}
      }
    }

    // ══════════════════════════════════════════
    //  HTML 포맷
    // ══════════════════════════════════════════
    function formatHTML() {
      try {
        const raw = editor.value;
        let indent = 0;
        const INLINE = /^<(a|b|i|u|em|strong|span|code|label|small|sup|sub|img|br|input|button)/i;
        const VOID   = /^<(area|base|br|col|embed|hr|img|input|link|meta|param|source|track|wbr)/i;
        const CLOSE  = /^<\//;
        const OPEN   = /^<[^\/!?]/;
        const tokens = raw
          .replace(/<!--[\s\S]*?-->/g, m => '\n' + m + '\n')
          .replace(/>\s*</g, '>\n<')
          .split('\n').map(l => l.trim()).filter(Boolean);
        let out = '';
        tokens.forEach(tok => {
          if (CLOSE.test(tok)) indent = Math.max(0, indent - 1);
          out += '  '.repeat(indent) + tok + '\n';
          if (OPEN.test(tok) && !VOID.test(tok) && !INLINE.test(tok) && !tok.includes('</')) indent++;
        });
        editor.value = out.trim();
        updateLineNums();
        showToast(t('toastFmt'));
      } catch(err) {
        showToast(t('toastFmtErr') + err.message);
      }
    }

    // ══════════════════════════════════════════
    //  복사 / 초기화
    // ══════════════════════════════════════════
    function copyHTML() {
      navigator.clipboard.writeText(editor.value).then(() => {
        showToast(t('toastCopied'));
      }).catch(() => {
        editor.select();
        document.execCommand('copy');
        showToast(t('toastCopied'));
      });
    }

    function clearAll() {
      if (!confirm(t('clearConfirm'))) return;
      editor.value = '';
      iframe.srcdoc = '';
      demoMode = false;
      updateLineNums();
      updateStatusBar();
    }

    // ══════════════════════════════════════════
    //  단축키
    // ══════════════════════════════════════════
    function handleKey(e) {
      if (e.key === 'Tab') {
        e.preventDefault();
        const s = editor.selectionStart, end = editor.selectionEnd;
        if (s === end) {
          editor.value = editor.value.slice(0, s) + '  ' + editor.value.slice(end);
          editor.selectionStart = editor.selectionEnd = s + 2;
        } else {
          const lines = editor.value.slice(s, end).split('\n');
          const shifted = lines.map(l => '  ' + l).join('\n');
          editor.value = editor.value.slice(0, s) + shifted + editor.value.slice(end);
          editor.selectionStart = s;
          editor.selectionEnd = s + shifted.length;
        }
        updateLineNums();
      }
    }

    document.addEventListener('keydown', function(e) {
      if (e.key === 'F5') {
        e.preventDefault();
        applyToPreview();
        showToast(t('toastApplied'));
      }
      if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'e') {
        e.preventDefault();
        toggleEditMode();
      }
      if ((e.ctrlKey || e.metaKey) && e.shiftKey && e.key.toLowerCase() === 'c') {
        e.preventDefault();
        copyHTML();
      }
    });

    // ══════════════════════════════════════════
    //  줄번호 / 상태바
    // ══════════════════════════════════════════
    function updateLineNums() {
      const count = editor.value.split('\n').length;
      lineNums.textContent = Array.from({length: count}, (_, i) => i + 1).join('\n');
      updateStatusBar();
    }

    function updateStatusBar() {
      const v = editor.value;
      document.getElementById('statusChars').textContent =
        v.length.toLocaleString() + t('charUnit');
      document.getElementById('statusLines').textContent =
        v.split('\n').length + t('lineUnit');
    }

    function setRight(text) {
      const el = document.getElementById('statusRight');
      el.textContent = text;
      el.classList.add('flash');
      setTimeout(() => el.classList.remove('flash'), 1500);
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2200);
    }

    function now() {
      return new Date().toLocaleTimeString(undefined, {hour:'2-digit', minute:'2-digit', second:'2-digit'});
    }

    // ══════════════════════════════════════════
    //  분할 바 드래그
    // ══════════════════════════════════════════
    (function() {
      const divider    = document.getElementById('divider');
      const mainArea   = document.getElementById('mainArea');
      const editorPane = document.getElementById('editorPane');
      let dragging = false;
      divider.addEventListener('mousedown', e => {
        dragging = true;
        divider.classList.add('dragging');
        document.body.style.cssText += 'cursor:col-resize;user-select:none;';
        iframe.style.pointerEvents = 'none';
        e.preventDefault();
      });
      document.addEventListener('mousemove', e => {
        if (!dragging) return;
        const r = mainArea.getBoundingClientRect();
        let pct = Math.max(20, Math.min(80, (e.clientX - r.left) / r.width * 100));
        editorPane.style.width = pct + '%';
      });
      document.addEventListener('mouseup', () => {
        if (!dragging) return;
        dragging = false;
        divider.classList.remove('dragging');
        document.body.style.cursor = '';
        document.body.style.userSelect = '';
        iframe.style.pointerEvents = '';
      });
    })();

    // ══════════════════════════════════════════
    //  파일 드래그 앤 드롭
    // ══════════════════════════════════════════
    document.addEventListener('dragover', e => e.preventDefault());
    document.addEventListener('drop', function(e) {
      e.preventDefault();
      const file = e.dataTransfer.files[0];
      if (!file || !file.name.match(/\.html?$/i)) {
        showToast(t('toastFileOnly')); return;
      }
      const reader = new FileReader();
      reader.onload = ev => {
        editor.value = ev.target.result;
        demoMode = false;
        updateLineNums();
        updateStatusBar();
        showToast('📂 ' + file.name + ' ' + t('toastFileOpen'));
      };
      reader.readAsText(file, 'UTF-8');
    });
  </script>
</body>
</html>
